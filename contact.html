<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Registration - Laced Up Legends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/images/Logo.png" alt="LUL Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="event-detail.html">Event Details</a></li>
                <li><a href="participants.html">Participants</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <h2>Get in Touch</h2>
            <p>Have questions about the event, venting opportunities, or general inquiries? Reach out to us using the form below or contact us directly via email.</p>
            <form action="#" method="post" class="contact-form">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <label for="type">Registering as:</label>
                <select name="type" id="type" required>
                    <option value="">-- Select --</option>
                    <option value="vendor">Vendor</option>
                    <option value="attendee">Attendee</option>
                    <option value="media">Media</option>
                </select>

                <label for="message">Message / Inquiry:</label>
                <textarea id="message" name="message" rows="5" placeholder="Your message..."></textarea>

                <button type="submit" class="cta-button">Submit Registration</button>
            </form>
        </section>
    </main>

    <section class="socials">
        <h3>Follow Us On</h3>
        <div class="social-icons">
          <a href="#"><img src="images/images/insta.jpeg" alt="Instagram" /></a>
          <a href="#"><img src="images/images/twitter.png" alt="Twitter" /></a>
          <a href="#"><img src="images/images/facebook.png" alt="Facebook" /></a>
          <a href="#"><img src="images/images/tiktok_PNG3.png" alt="TikTok" /></a>
        </div>
      </section>
    
      <footer>
        <p>&copy; 2025 Laced Up Legends. All rights reserved.</p>
      </footer>
</body>
</html>
